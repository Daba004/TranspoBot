<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Proxy configuration for FastAPI
    ProxyPreserveHost On
    
    # Redirect API calls to the local FastAPI server on port 8000
    ProxyPass /ask http://127.0.0.1:8000/ask
    ProxyPassReverse /ask http://127.0.0.1:8000/ask
    
    ProxyPass /stream http://127.0.0.1:8000/stream
    ProxyPassReverse /stream http://127.0.0.1:8000/stream
    
    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
